<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meta & OG Tester</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="page-info">
      <div class="page-url" id="page-url">Loading…</div>
      <button class="refresh-btn" id="refresh-btn" title="Re-read page and bypass image cache" aria-label="Refresh">↻</button>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="previews">Previews</button>
      <button class="tab" data-tab="og">Open Graph</button>
      <button class="tab" data-tab="twitter">Twitter</button>
      <button class="tab" data-tab="seo">SEO</button>
      <button class="tab" data-tab="all">All</button>
      <button class="tab" data-tab="fix">Fix</button>
    </nav>
  </header>

  <main id="content">
    <div class="loading">Reading page…</div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
